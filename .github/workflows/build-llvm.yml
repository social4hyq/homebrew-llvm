name: Build LLVM Bottle

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'LLVM version (e.g. 21.1.8)'
        required: true
        default: '21.1.8'
        type: string
      formula:
        description: 'Formula (llvm@21, llvm@22, llvm)'
        required: true
        default: 'llvm@21'
        type: choice
        options:
          - llvm@21
          - llvm@22
          - llvm

jobs:
  build:
    name: ${{ inputs.formula }} ${{ inputs.version }}
    runs-on:
      - self-hosted
      - ohos-aarch64

    container:
      image: swr.cn-north-4.myhuaweicloud.com/harmonybrew/ci-runner:latest
      credentials:
        username: ${{ secrets.SWR_USERNAME }}
        password: ${{ secrets.SWR_PASSWORD }}
      volumes:
        - /data/storage/el2/base:/data/storage/el2/base

    env:
      TMPDIR: /data/storage/el2/base
      HOMEBREW_NO_AUTO_UPDATE: 1
      HOMEBREW_NO_INSTALL_CLEANUP: 1
      FORMULA: ${{ inputs.formula }}
      VERSION: ${{ inputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Homebrew tap
        run: |
          TAP_DIR="$(brew --prefix)/Homebrew/Library/Taps/social4hyq/homebrew-llvm"
          mkdir -p "$TAP_DIR"
          cp -r Formula Patches "$TAP_DIR/"
          cd "$TAP_DIR"
          git init
          git add . && git commit -m "tap" --no-gpg-sign

      - name: Verify dependencies
        run: |
          brew list cmake ninja zstd 2>/dev/null || brew install cmake ninja zstd
          echo "=== ohos-sdk ==="
          ls "$(brew --prefix)/opt/ohos-sdk/native/sysroot/usr/lib" | head -3
          ls "$(brew --prefix)/opt/ohos-sdk/native/llvm/include/libcxx-ohos/include/c++/v1" | head -3

      - name: Build from source
        timeout-minutes: 180
        run: |
          echo "=== Build started at $(date) ==="
          brew install --build-from-source "$FORMULA"
          echo "=== Build finished at $(date) ==="
          brew --prefix "$FORMULA"

      - name: Create bottle tarball
        run: |
          CELLAR="$(brew --cellar ${FORMULA})/${VERSION}"
          echo "Cellar: $CELLAR"
          ls "$CELLAR/bin/clang"

          BOTTLE_FILE="${FORMULA}-${VERSION}.arm64_ohos.bottle.tar.gz"
          cd "$CELLAR/.."
          tar cJf "/tmp/${BOTTLE_FILE}" "${VERSION}"
          ls -lh "/tmp/${BOTTLE_FILE}"
          echo "BOTTLE_FILE=${BOTTLE_FILE}" >> "$GITHUB_ENV"

      - name: Calculate SHA256
        id: sha
        run: |
          SHA256=$(sha256sum "/tmp/${BOTTLE_FILE}" | cut -d' ' -f1)
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "SHA256: ${SHA256}"

      - name: Upload bottle to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "v${VERSION}" --yes 2>/dev/null || true
          gh release create "v${VERSION}" \
            --title "LLVM ${VERSION} Bottle (arm64_ohos)" \
            --notes "Built from source: AArch64-only, LTO=OFF, static zstd." \
            "/tmp/${BOTTLE_FILE}"

      - name: Update formula SHA256 and push
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA256="${{ steps.sha.outputs.sha256 }}"

          case "$FORMULA" in
            llvm@21) FORMULA_FILE="Formula/l/llvm@21.rb" ;;
            llvm@22) FORMULA_FILE="Formula/l/llvm@22.rb" ;;
            llvm)    FORMULA_FILE="Formula/l/llvm.rb"    ;;
          esac

          sed -i "s/sha256 cellar: :any_skip_relocation, arm64_ohos: \".*\"/sha256 cellar: :any_skip_relocation, arm64_ohos: \"${SHA256}\"/" "$FORMULA_FILE"

          git add "$FORMULA_FILE"
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -m "bottle(${FORMULA}): update SHA256 for v${VERSION}

          Co-Authored-By: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          git push origin main
